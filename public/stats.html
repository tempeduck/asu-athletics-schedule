<!--
  /stats — ASU Athletics Site Analytics Dashboard
  Data: Cloudflare Web Analytics beacon (rumPageloadEventsAdaptiveGroups)
  Scope: asu.dikaiaserver.com only (requestHost filter)
  Counts: true browser page loads — not CDN requests or API calls

  ── ZERO TRUST ACCESS SETUP (one-time) ──────────────────────────────────────
  1. dash.cloudflare.com → Zero Trust → Access → Applications → Add Application
  2. Type: Self-hosted
  3. Application name: "ASU Analytics"
  4. Subdomain: asu  |  Domain: dikaiaserver.com  |  Path: /stats
  5. Session Duration: 24 hours
  6. Create Access Policy: Emails in list → robert.scheib@gmail.com
  7. Save
  ────────────────────────────────────────────────────────────────────────────

  ── REQUIRED ENV VARS (/home/robert/projects/secrets.env) ───────────────────
    CF_ANALYTICS_TOKEN=<token with Zone:Analytics:Read + Account:Analytics:Read>
    CF_ACCOUNT_ID=<Cloudflare account ID>
  ────────────────────────────────────────────────────────────────────────────
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ASU · Analytics</title>
<style>
:root {
  --maroon: #8C1D40;
  --gold:   #FFC627;
  --blue:   #4a9eff;
  --bg:     #0d0d0d;
  --s0:     #101010;
  --s1:     #181818;
  --s2:     #1f1f1f;
  --border: #252525;
  --text:   #e0e0e0;
  --dim:    #636363;
  --muted:  #2e2e2e;
  --mono:   'Courier New', Courier, monospace;
  --r:      6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  background: var(--bg);
  background-image: repeating-linear-gradient(0deg,transparent,transparent 1px,rgba(255,255,255,.014) 1px,rgba(255,255,255,.014) 2px);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
}

/* Header */
header { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; padding:13px 20px; background:var(--s0); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10; }
.hl,.hr { display:flex; align-items:center; gap:10px; }
.logo { font-weight:900; font-size:1rem; letter-spacing:.06em; color:var(--gold); background:var(--maroon); padding:3px 8px; border-radius:4px; }
.htitle { font-size:.9rem; font-weight:600; color:var(--dim); letter-spacing:.03em; }
.dp { display:flex; gap:4px; }
.db { background:none; border:1px solid var(--border); color:var(--dim); padding:4px 11px; border-radius:20px; cursor:pointer; font-size:.76rem; transition:border-color .15s,color .15s; }
.db:hover { border-color:var(--gold); color:var(--gold); }
.db.on { background:var(--gold); border-color:var(--gold); color:#000; font-weight:700; }
.upd { font-size:.7rem; color:var(--muted); font-family:var(--mono); }
.rfbtn { background:none; border:1px solid var(--border); color:var(--dim); width:28px; height:28px; border-radius:50%; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; transition:border-color .15s,color .15s; }
.rfbtn:hover { border-color:var(--gold); color:var(--gold); }
.rfbtn.spin { animation:spin .6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Layout */
main { max-width:1200px; margin:0 auto; padding:20px 16px 48px; display:flex; flex-direction:column; gap:16px; }
.krow { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
@media(max-width:680px){ .krow { grid-template-columns:1fr 1fr; } }
@media(max-width:380px){ .krow { grid-template-columns:1fr; } }
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media(max-width:760px){ .g2 { grid-template-columns:1fr; } }

/* Cards */
.card { background:var(--s1); border:1px solid var(--border); border-radius:var(--r); padding:18px; }
.ct { font-size:.6rem; font-weight:700; letter-spacing:.13em; color:var(--dim); text-transform:uppercase; margin-bottom:14px; }

/* KPI */
.kc { background:var(--s1); border:1px solid var(--border); border-radius:var(--r); padding:18px 20px; display:flex; flex-direction:column; gap:5px; }
.kc.hi { border-color:rgba(255,198,39,.22); background:var(--s2); }
.kv { font-family:var(--mono); font-size:1.8rem; font-weight:700; color:var(--gold); line-height:1; }
.kl { font-size:.6rem; text-transform:uppercase; letter-spacing:.1em; color:var(--dim); }
.ks { font-size:.7rem; color:var(--muted); margin-top:1px; }

/* Skeleton */
.sk { border-radius:var(--r); background:linear-gradient(90deg,var(--s1) 25%,var(--s2) 50%,var(--s1) 75%); background-size:200% 100%; animation:shim 1.4s infinite; }
.sk.kc { height:86px; }
@keyframes shim { to { background-position:-200% 0; } }

/* Chart */
.cwrap { overflow-x:auto; }
.cwrap svg { display:block; min-width:100%; }
.tick { fill:var(--dim); font-size:10px; font-family:var(--mono); }
.bar { cursor:crosshair; }
.bar:hover { opacity:.72; }

/* Tooltip */
#tip { position:fixed; pointer-events:none; z-index:200; background:var(--s2); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:4px; font-size:.76rem; font-family:var(--mono); white-space:nowrap; box-shadow:0 4px 14px rgba(0,0,0,.5); display:none; }

/* Donut */
.donut-wrap { display:flex; align-items:center; gap:20px; }
.donut-svg { flex-shrink:0; }
.legend { display:flex; flex-direction:column; gap:10px; }
.li { display:flex; align-items:center; gap:8px; font-size:.8rem; }
.ldot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.llabel { color:var(--dim); }
.lval { font-family:var(--mono); margin-left:auto; }

/* Bar list */
.blist { display:flex; flex-direction:column; gap:9px; }
.bi { display:flex; align-items:center; gap:8px; }
.biflag { font-size:.95rem; width:22px; text-align:center; flex-shrink:0; }
.biname { font-size:.78rem; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.bicnt { font-family:var(--mono); font-size:.74rem; color:var(--dim); flex-shrink:0; min-width:38px; text-align:right; }
.bitrack { height:3px; background:var(--muted); border-radius:2px; flex-shrink:0; width:64px; }
.bifill { height:100%; border-radius:2px; }

/* Pages table */
.ptbl { width:100%; border-collapse:collapse; }
.ptbl th { font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); padding:0 0 8px; text-align:left; border-bottom:1px solid var(--border); }
.ptbl th.r,.ptbl td.r { text-align:right; }
.ptbl td { padding:8px 0; border-bottom:1px solid rgba(255,255,255,.035); font-size:.8rem; }
.ptbl td.n { color:var(--muted); font-family:var(--mono); width:22px; }
.ptbl td.path { color:var(--gold); font-family:var(--mono); font-size:.75rem; max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ptbl td.cnt { font-family:var(--mono); }

/* Empty / Error */
.empty { color:var(--muted); font-size:.78rem; padding:4px 0; }
.errc { background:rgba(140,29,64,.1); border:1px solid var(--maroon); border-radius:var(--r); padding:20px; display:flex; flex-direction:column; gap:8px; }
.errc strong { color:#e57373; }
.errc code { font-size:.74rem; color:var(--dim); font-family:var(--mono); }
.errc p { font-size:.74rem; color:#555; }
.rtbtn { align-self:flex-start; margin-top:4px; background:none; border:1px solid var(--maroon); color:#e57373; padding:5px 14px; border-radius:4px; cursor:pointer; font-size:.76rem; }
.rtbtn:hover { background:rgba(140,29,64,.2); }
</style>
</head>
<body>

<header>
  <div class="hl">
    <span class="logo">ASU</span>
    <span class="htitle">Site Analytics</span>
  </div>
  <div class="hr">
    <div class="dp" id="dp">
      <button class="db on" data-d="7">7d</button>
      <button class="db" data-d="30">30d</button>
      <button class="db" data-d="90">90d</button>
    </div>
    <span class="upd" id="upd">—</span>
    <button class="rfbtn" id="rfbtn" title="Refresh" onclick="doRefresh()">↻</button>
  </div>
</header>

<main>
  <div class="krow" id="kpi">
    <div class="sk kc"></div><div class="sk kc"></div>
    <div class="sk kc"></div><div class="sk kc"></div>
  </div>

  <div class="card">
    <div class="ct">Page Views Over Time</div>
    <div class="cwrap" id="chart"><div class="sk" style="height:150px"></div></div>
  </div>

  <div class="g2">
    <div class="card"><div class="ct">Top Pages</div><div id="pages"><div class="sk" style="height:200px"></div></div></div>
    <div class="card"><div class="ct">Devices</div><div id="devices"><div class="sk" style="height:200px"></div></div></div>
  </div>

  <div class="g2">
    <div class="card"><div class="ct">Countries</div><div id="countries"><div class="sk" style="height:200px"></div></div></div>
    <div class="card"><div class="ct">Browsers</div><div id="browsers"><div class="sk" style="height:200px"></div></div></div>
  </div>

  <div class="card">
    <div class="ct">Referrers</div>
    <div id="referrers"><div class="sk" style="height:100px"></div></div>
  </div>
</main>

<div id="tip"></div>

<script>
'use strict';

// ── Utils ─────────────────────────────────────────────────────────────────────
function isoFlag(code) {
  if (!code || code.length !== 2) return '🌐';
  return Array.from(code.toUpperCase()).map(c => String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65)).join('');
}
const regionNames = new Intl.DisplayNames(['en'], { type: 'region' });
function cname(code) { try { return regionNames.of(code.toUpperCase()) || code; } catch { return code; } }
function fmt(n) { if (n>=1e6) return (n/1e6).toFixed(1)+'M'; if (n>=1e3) return (n/1e3).toFixed(1)+'K'; return n.toLocaleString(); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function relTime(ts) { const s=Math.floor((Date.now()-ts)/1000); if(s<60) return 'just now'; if(s<3600) return Math.floor(s/60)+'m ago'; return Math.floor(s/3600)+'h ago'; }
function fmtDate(iso) { return new Date(iso+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }

// ── State ─────────────────────────────────────────────────────────────────────
let days = 7, fetchedAt = null;

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function load(d) {
  document.getElementById('rfbtn').classList.add('spin');
  try {
    const r = await fetch('/api/cf-stats?days='+d);
    const json = await r.json();
    if (!r.ok) throw new Error(json.error || 'HTTP '+r.status);
    if (json.errors?.length) throw new Error(json.errors.map(e=>e.message).join('; '));
    const acct = json?.data?.viewer?.accounts?.[0] || {};
    fetchedAt = Date.now();
    document.getElementById('upd').textContent = 'Updated: '+relTime(fetchedAt);
    render(acct, d);
  } catch(err) { showError(err.message); }
  finally { document.getElementById('rfbtn').classList.remove('spin'); }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(a, d) {
  renderKPI(a, d);
  renderChart(a.byDate||[], d);
  renderPages(a.byPath||[]);
  renderDevices(a.byDevice||[]);
  renderCountries(a.byCountry||[]);
  renderBrowsers(a.byBrowser||[]);
  renderReferrers(a.byReferrer||[]);
}

// ── KPI ───────────────────────────────────────────────────────────────────────
function renderKPI(a, d) {
  const total = (a.byDate||[]).reduce((s,r)=>s+r.count,0);
  const avg   = d>0 ? Math.round(total/d) : 0;
  const cmap  = {};
  (a.byCountry||[]).forEach(r=>{ cmap[r.dimensions.countryName]=(cmap[r.dimensions.countryName]||0)+r.count; });
  const top = Object.entries(cmap).sort((a,b)=>b[1]-a[1])[0];
  const countries = Object.keys(cmap).length;
  document.getElementById('kpi').innerHTML = `
    <div class="kc hi"><div class="kv">${fmt(total)}</div><div class="kl">Page Views</div><div class="ks">Beacon-fired · asu.dikaiaserver.com</div></div>
    <div class="kc"><div class="kv">${fmt(countries)}</div><div class="kl">Countries</div><div class="ks">Distinct source countries</div></div>
    <div class="kc"><div class="kv">${fmt(avg)}</div><div class="kl">Avg / Day</div><div class="ks">Over ${d} day${d!==1?'s':''}</div></div>
    <div class="kc"><div class="kv">${top?isoFlag(top[0]):'—'}</div><div class="kl">Top Country</div><div class="ks">${top?esc(cname(top[0])):'—'}</div></div>`;
}

// ── Chart ─────────────────────────────────────────────────────────────────────
function renderChart(byDate, d) {
  const el = document.getElementById('chart');
  if (!byDate.length) { el.innerHTML='<div class="empty">No data yet — beacon fires on page load</div>'; return; }
  const W=760,H=150,PT=8,PB=32,ch=H-PT-PB;
  const n=byDate.length, mx=Math.max(...byDate.map(r=>r.count),1);
  const sw=W/n, bw=Math.max(sw*.58,2), le=n<=7?1:n<=31?7:15;
  const bars = byDate.map((r,i)=>{
    const bh=Math.max((r.count/mx)*ch,1), bx=i*sw+(sw-bw)/2, by=PT+ch-bh;
    const lbl=`${fmtDate(r.dimensions.date)}: ${r.count.toLocaleString()} views`;
    return `<rect class="bar" x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="#FFC627" rx="1" onmouseenter="showTip(event,${JSON.stringify(lbl)})" onmouseleave="hideTip()"/>`;
  }).join('');
  const ticks = byDate.map((r,i)=>{
    if(i%le!==0) return '';
    return `<text class="tick" x="${(i*sw+sw/2).toFixed(1)}" y="${PT+ch+15}" text-anchor="middle">${fmtDate(r.dimensions.date)}</text>`;
  }).join('');
  el.innerHTML=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:${H}px;overflow:visible">
    <line x1="0" y1="${PT+ch}" x2="${W}" y2="${PT+ch}" stroke="#252525" stroke-width="1"/>
    ${bars}${ticks}
    <text class="tick" x="3" y="${PT+9}" style="fill:#393939">${fmt(mx)}</text>
  </svg>`;
}

// ── Pages ─────────────────────────────────────────────────────────────────────
function renderPages(byPath) {
  const el = document.getElementById('pages');
  if (!byPath.length) { el.innerHTML='<div class="empty">No data yet</div>'; return; }
  const agg={};
  byPath.forEach(r=>{ const p=r.dimensions.requestPath||'/'; agg[p]=(agg[p]||0)+r.count; });
  const sorted=Object.entries(agg).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const total=sorted.reduce((s,[,v])=>s+v,0);
  const rows=sorted.map(([path,cnt],i)=>{
    const pct=total?((cnt/total)*100).toFixed(0):'0';
    return `<tr><td class="n">${i+1}</td><td class="path" title="${esc(path)}">${esc(path)}</td><td class="cnt r">${cnt}</td><td class="r" style="color:var(--dim);font-family:var(--mono);width:36px">${pct}%</td></tr>`;
  }).join('');
  el.innerHTML=`<table class="ptbl"><thead><tr><th>#</th><th>Path</th><th class="r">Views</th><th class="r">%</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// ── Devices donut ─────────────────────────────────────────────────────────────
function renderDevices(byDevice) {
  const el = document.getElementById('devices');
  if (!byDevice.length) { el.innerHTML='<div class="empty">No data yet</div>'; return; }
  const COLORS = { mobile:var(--maroon), desktop:'#FFC627', tablet:'#4a9eff' };
  // Can't use CSS vars in JS strings — use literals
  const DC = { mobile:'#8C1D40', desktop:'#FFC627', tablet:'#4a9eff', other:'#555' };
  const DL = { mobile:'Mobile', desktop:'Desktop', tablet:'Tablet', other:'Other' };
  const agg={};
  byDevice.forEach(r=>{ const t=(r.dimensions.deviceType||'other').toLowerCase(); agg[t]=(agg[t]||0)+r.count; });
  const total=Object.values(agg).reduce((s,v)=>s+v,0)||1;
  const order=['mobile','desktop','tablet','other'].filter(k=>agg[k]);

  const cx=65,cy=65,r=48,sw=20,circ=2*Math.PI*r;
  let offset=0;
  const segs=order.map(k=>{
    const dash=(agg[k]/total)*circ;
    const s=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${DC[k]||'#555'}" stroke-width="${sw}" stroke-dasharray="${dash.toFixed(2)} ${circ.toFixed(2)}" stroke-dashoffset="${(-offset).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=dash; return s;
  }).join('');

  const topK=order[0];
  const topPct=topK?Math.round((agg[topK]/total)*100):0;
  const leg=order.map(k=>`<div class="li"><span class="ldot" style="background:${DC[k]}"></span><span class="llabel">${DL[k]||k}</span><span class="lval">${Math.round((agg[k]/total)*100)}%</span></div>`).join('');

  el.innerHTML=`<div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 130 130" width="130" height="130">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#222" stroke-width="${sw}"/>
      ${segs}
      <text x="${cx}" y="${cy-4}" text-anchor="middle" fill="#aaa" font-size="10" font-family="sans-serif">${DL[topK]||''}</text>
      <text x="${cx}" y="${cy+14}" text-anchor="middle" fill="#FFC627" font-size="18" font-weight="700" font-family="monospace">${topPct}%</text>
    </svg>
    <div class="legend">${leg}</div>
  </div>`;
}

// ── Countries ─────────────────────────────────────────────────────────────────
function renderCountries(byCountry) {
  const el = document.getElementById('countries');
  if (!byCountry.length) { el.innerHTML='<div class="empty">No data yet</div>'; return; }
  const agg={};
  byCountry.forEach(r=>{ const c=r.dimensions.countryName||'??'; agg[c]=(agg[c]||0)+r.count; });
  const sorted=Object.entries(agg).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const mx=sorted[0]?.[1]||1;
  el.innerHTML='<div class="blist">'+sorted.map(([code,cnt])=>{
    const pct=((cnt/mx)*100).toFixed(1);
    return `<div class="bi"><span class="biflag">${isoFlag(code)}</span><span class="biname">${esc(cname(code))}</span><span class="bicnt">${cnt}</span><div class="bitrack"><div class="bifill" style="width:${pct}%;background:#FFC627"></div></div></div>`;
  }).join('')+'</div>';
}

// ── Browsers ──────────────────────────────────────────────────────────────────
function renderBrowsers(byBrowser) {
  const el = document.getElementById('browsers');
  if (!byBrowser.length) { el.innerHTML='<div class="empty">No data yet</div>'; return; }
  const BC={Chrome:'#4285F4',ChromeMobile:'#4285F4',Chromium:'#4285F4',Firefox:'#FF7139',Safari:'#006CFF',MobileSafari:'#006CFF',Edge:'#0078D7',Opera:'#FF1B2D',Samsung:'#1428A0',Curl:'#777',Unknown:'#444'};
  const agg={};
  byBrowser.forEach(r=>{ const n=r.dimensions.userAgentBrowser||'Unknown'; agg[n]=(agg[n]||0)+r.count; });
  const sorted=Object.entries(agg).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const mx=sorted[0]?.[1]||1;
  el.innerHTML='<div class="blist">'+sorted.map(([name,cnt])=>{
    const pct=((cnt/mx)*100).toFixed(1), color=BC[name]||'#FFC627';
    return `<div class="bi"><span class="biname">${esc(name)}</span><span class="bicnt">${cnt}</span><div class="bitrack"><div class="bifill" style="width:${pct}%;background:${color}"></div></div></div>`;
  }).join('')+'</div>';
}

// ── Referrers ─────────────────────────────────────────────────────────────────
function renderReferrers(byReferrer) {
  const el = document.getElementById('referrers');
  if (!byReferrer.length) { el.innerHTML='<div class="empty">No referrer data yet</div>'; return; }
  const agg={};
  byReferrer.forEach(r=>{ const h=r.dimensions.refererHost||''; agg[h||'Direct / None']=(agg[h||'Direct / None']||0)+r.count; });
  const sorted=Object.entries(agg).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const mx=sorted[0]?.[1]||1;
  el.innerHTML='<div class="blist">'+sorted.map(([host,cnt])=>{
    const pct=((cnt/mx)*100).toFixed(1), isDirect=host==='Direct / None';
    return `<div class="bi"><span class="biname" style="${isDirect?'color:var(--dim)':''}">${esc(host)}</span><span class="bicnt">${cnt}</span><div class="bitrack"><div class="bifill" style="width:${pct}%;background:#FFC627"></div></div></div>`;
  }).join('')+'</div>';
}

// ── Error ─────────────────────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('kpi').innerHTML=`<div class="errc" style="grid-column:1/-1">
    <strong>Failed to load analytics</strong>
    <code>${esc(msg)}</code>
    <p>Ensure CF_ANALYTICS_TOKEN has Account:Analytics:Read and CF_ACCOUNT_ID is set in secrets.env.</p>
    <button class="rtbtn" onclick="doRefresh()">Retry</button>
  </div>`;
  ['chart','pages','devices','countries','browsers','referrers'].forEach(id=>{const e=document.getElementById(id);if(e)e.innerHTML='';});
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tipEl=document.getElementById('tip');
function showTip(e,t){tipEl.textContent=t;tipEl.style.display='block';moveTip(e);}
function moveTip(e){tipEl.style.left=(e.clientX+14)+'px';tipEl.style.top=(e.clientY-34)+'px';}
function hideTip(){tipEl.style.display='none';}
document.addEventListener('mousemove',e=>{if(tipEl.style.display!=='none')moveTip(e);});

// ── Day selector ──────────────────────────────────────────────────────────────
document.getElementById('dp').addEventListener('click',e=>{
  const b=e.target.closest('.db'); if(!b) return;
  document.querySelectorAll('.db').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); days=parseInt(b.dataset.d,10); load(days);
});
setInterval(()=>{ if(fetchedAt) document.getElementById('upd').textContent='Updated: '+relTime(fetchedAt); },30000);
function doRefresh(){load(days);}
load(7);
</script>
</body>
</html>

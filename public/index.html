<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" type="image/png" href="sparky.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#8C1D40" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sun Devils" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <title>ASU Sun Devil Athletics Calendar</title>

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="style.css?v=3" />
  <link rel="stylesheet" href="feedback.css" />

  <!-- Umami Analytics -->
  <script async src="https://umami.dikaiaserver.com/script.js" data-website-id="75979f43-60c3-400f-bdfe-42d906501566"></script>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
        <div class="logo-icon">
          <img src="sparky.png" alt="Sparky"
               onerror="this.parentElement.innerHTML='<span class=\'logo-icon-text\'>🔱</span>'" />
        </div>
        <div class="logo-wordmark">
          <span class="logo-asu">ASU</span>
          <span class="logo-text">Sun Devil Athletics</span>
        </div>
      </div>
    <div class="header-controls">
      <div class="view-toggle">
        <button id="btn-live-view" onclick="setView('live')">
          <span id="live-tab-dot" class="live-tab-dot" style="display:none"></span>Live
        </button>
        <button id="btn-calendar-view" onclick="setView('calendar')">Calendar</button>
        <button id="btn-list-view" onclick="setView('list')">List</button>
        <button id="btn-map-view" onclick="setView('map')">Map</button>
      </div>
      <button class="btn-filters-toggle" id="btn-filters" onclick="toggleFilters()">Filters</button>
      <button class="btn-subscribe" onclick="copyIcsUrl()" title="Subscribe to schedule in Apple/Google Calendar">
        📅 <span class="sub-label">Subscribe</span>
      </button>
      <button class="btn-refresh" id="btn-refresh" onclick="triggerRefresh()" title="Refresh event data" aria-label="Refresh event data">↻</button>
    </div>
  </div>
</header>

<div class="app-body">
  <aside id="sidebar">
    <div class="filter-group">
      <label class="group-label">Sport</label>
      <div class="sport-list" id="sport-list">
        <em style="font-size:0.8rem;color:#999">Loading…</em>
      </div>
    </div>

    <div class="filter-group">
      <label class="group-label">Season</label>
      <select id="filter-season" onchange="applySeason(this.value)">
        <option value="">All Seasons</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="group-label">Game Type</label>
      <div class="game-type-toggles" id="game-type-toggles">
        <button data-type="home" onclick="toggleGameType(this)">Home</button>
        <button data-type="away" onclick="toggleGameType(this)">Away</button>
        <button data-type="neutral" onclick="toggleGameType(this)">Neutral</button>
      </div>
    </div>

    <div class="filter-group">
      <label class="group-label">Location</label>
      <select id="filter-region" onchange="toggleRegion(this)" style="margin-bottom:6px">
        <option value="">All Regions</option>
      </select>
      <select id="filter-state" onchange="applyFilters()">
        <option value="">All States</option>
      </select>
    </div>

    <div class="filter-group filter-group-collapsible" id="date-range-group">
      <button class="filter-collapse-toggle" onclick="toggleDateRange()" id="date-range-toggle">
        Date Range <span class="collapse-arrow" id="date-range-arrow">▶</span>
      </button>
      <div class="filter-collapse-body" id="date-range-body" style="display:none">
        <label class="group-label" style="margin-top:8px">From</label>
        <input type="date" id="filter-from" onchange="applyFilters()" />
        <label class="group-label" style="margin-top:8px">To</label>
        <input type="date" id="filter-to" onchange="applyFilters()" />
      </div>
    </div>

    <button class="btn-clear-filters" onclick="clearFilters()">Clear All Filters</button>
  </aside>

  <main>
    <div id="live-banner" hidden></div>
    <div id="live-view"></div>
    <div id="calendar-view">
      <div id="calendar"></div>
    </div>
    <div id="list-view"></div>
    <div id="map-view"></div>
  </main>
</div>

<div id="status-bar">Loading events…</div>

<!-- Event detail modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <img class="modal-opponent-logo" id="modal-logo" src="" alt="" style="display:none" />
      <div class="modal-header-text">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-sport" id="modal-sport"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Game detail modal (live box score) -->
<div class="game-modal-overlay" id="game-modal-overlay">
  <div class="game-modal" id="game-modal">
    <button class="game-modal-close" onclick="window.closeGameModal && closeGameModal()">✕</button>
    <div id="game-modal-inner"><div class="game-modal-spinner"></div></div>
  </div>
</div>

<script src="filters.js?v=14"></script>
<script src="calendar.js?v=11"></script>
<script src="map.js?v=2"></script>
<script src="live.js?v=22"></script>
<script src="pwa.js?v=2"></script>
<script src="whats-new.js?v=2"></script>
<script src="feedback.js" defer></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
    // When a new SW takes control (after skipWaiting), reload so the page
    // picks up fresh cached files. Critical for PWA installs on iOS Safari.
    navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
  }
</script>

</body>
</html>
